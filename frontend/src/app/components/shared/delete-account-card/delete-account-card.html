<!-- --------------------------------------------------------------------------
     DELETE ACCOUNT CARD: Aviso + botón que abre modal de confirmación
     -------------------------------------------------------------------------- -->
<section class="delete-card">
  <h3 class="delete-card__title">Eliminar cuenta de usuario</h3>

  <p class="delete-card__warning">
    Atención: Esta acción es irreversible y no podrás
    recuperar tu usuario y los datos asociados
  </p>

  <app-button
    variant="primary"
    size="full"
    class="delete-card__action"
    (click)="openConfirm()"
  >
    Eliminar cuenta permanentemente
  </app-button>
</section>

<!-- Modal de confirmación -->
@if (showConfirm) {
  <app-confirm-modal
    title="Eliminar cuenta"
    message="¿Estás seguro de que quieres eliminar tu cuenta? Se borrarán todos tus datos permanentemente y no podrás recuperarlos."
    confirmLabel="Eliminar"
    cancelLabel="Cancelar"
    (confirmed)="onConfirm()"
    (cancelled)="onCancel()"
  />
}
