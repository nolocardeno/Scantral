<!-- --------------------------------------------------------------------------
     PAGE HEADER: Título + subtítulo a la izquierda, botones a la derecha
     -------------------------------------------------------------------------- -->
<header class="page-header">
  <hgroup class="page-header__text">
    <h1 class="page-header__title">{{ title() }}</h1>

    @if (subtitle()) {
      <p class="page-header__subtitle">{{ subtitle() }}</p>
    }
  </hgroup>

  <nav class="page-header__actions">
    <ng-content select="[buttons]" />
  </nav>
</header>
