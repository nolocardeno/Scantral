<!-- --------------------------------------------------------------------------
     SIDEBAR: Navegación lateral principal
     -------------------------------------------------------------------------- -->
<nav class="sidebar" aria-label="Navegación principal">
  <!-- ------------------------------------------------------------------
       BOTONES DE NAVEGACIÓN (apilados verticalmente)
       ------------------------------------------------------------------ -->
  <app-boton-de-sidebar
    tipo="Dashboard"
    [activo]="paginaActual() === 'Dashboard'"
    (click)="navegar('Dashboard')"
  />

  <app-boton-de-sidebar
    tipo="Grupos"
    [activo]="paginaActual() === 'Grupos'"
    (click)="navegar('Grupos')"
  />

  <app-boton-de-sidebar
    tipo="Validador"
    [activo]="paginaActual() === 'Validador'"
    (click)="navegar('Validador')"
  />

  <app-boton-de-sidebar
    tipo="Ajustes"
    [activo]="paginaActual() === 'Ajustes'"
    (click)="navegar('Ajustes')"
  />

  <!-- ------------------------------------------------------------------
       CERRAR SESIÓN (fijo en la parte inferior)
       ------------------------------------------------------------------ -->
  <app-boton-de-sidebar
    class="sidebar__cerrar-sesion"
    tipo="CerrarSesion"
    (click)="navegar('CerrarSesion')"
  />
</nav>
