<footer
  class="footer"
  [class.footer--con-sidebar]="variante() === 'con-sidebar'"
>
  <!-- --------------------------------------------------------------------------
       INFO (Logo + Copyright)
       -------------------------------------------------------------------------- -->
  <section class="footer__info">
    <img
      src="assets/images/Logo Scantral.png"
      alt="Logo de Scantral"
      class="footer__logo"
    />
    <small class="footer__copy">
      &copy; {{ currentYear }} Scantral. All rights reserved.
    </small>
  </section>

  <!-- --------------------------------------------------------------------------
       DIVISOR
       -------------------------------------------------------------------------- -->
  <span class="footer__divider" role="separator" aria-hidden="true"></span>

  <!-- --------------------------------------------------------------------------
       REDES SOCIALES
       -------------------------------------------------------------------------- -->
  <nav class="footer__social" aria-label="Redes sociales">
    <a
      href="https://github.com/nolocardeno"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="GitHub"
      class="footer__social-link"
    >
      <fa-icon [icon]="faGithub" />
    </a>
    <a
      href="https://www.linkedin.com/in/manolo-cardeno-sanchez"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="LinkedIn"
      class="footer__social-link"
    >
      <fa-icon [icon]="faLinkedinIn" />
    </a>
    <a
      href="https://www.instagram.com/nolorubio23/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Instagram"
      class="footer__social-link"
    >
      <fa-icon [icon]="faInstagram" />
    </a>
    <a
      href="https://x.com/Nolorubio23"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="X (Twitter)"
      class="footer__social-link"
    >
      <fa-icon [icon]="faXTwitter" />
    </a>
  </nav>
</footer>
