<header class="header">
  <!-- --------------------------------------------------------------------------
       BRAND (Logo + Texto)
       -------------------------------------------------------------------------- -->
  <a [routerLink]="authService.estaLogueado() ? '/dashboard' : '/'" class="header__brand">
    <img
      src="assets/images/Logo Scantral.png"
      alt="Logo de Scantral"
      class="header__logo"
    />
    <span class="header__title">Scantral</span>
  </a>

  <!-- --------------------------------------------------------------------------
       NAVEGACIÓN: Varía según estado de sesión
       -------------------------------------------------------------------------- -->
  @if (authService.estaLogueado()) {
    <nav class="header__nav">
      <app-card-usuario
        [username]="authService.usuario()!.name"
        subtitle="Cuenta personal"
      />
    </nav>
  } @else {
    <nav class="header__nav">
      <a (click)="authModal.abrirLogin()" class="header__link">Iniciar sesión</a>
      <a (click)="authModal.abrirRegistro()">
        <app-button variant="primary" size="md">Crear cuenta</app-button>
      </a>
    </nav>
  }
</header>
