<!-- --------------------------------------------------------------------------
     MODAL LOGIN: Formulario de inicio de sesión
     -------------------------------------------------------------------------- -->
<app-auth-card titulo="Inicio de sesión">
  <form class="login" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <app-campo-formulario
      label="Email"
      type="email"
      inputId="login-email"
      formControlName="email"
    />

    <app-campo-formulario
      label="Contraseña"
      type="password"
      inputId="login-password"
      formControlName="password"
    />

    <app-checkbox-formulario
      label="Recuérdame"
      checkboxId="login-remember"
      formControlName="rememberMe"
    />

    <hr class="login__separator" />

    <app-button variant="primary" size="auth" type="submit" class="login__action" [disabled]="loading">
      {{ loading ? 'Iniciando...' : 'Iniciar sesión' }}
    </app-button>
  </form>
</app-auth-card>
