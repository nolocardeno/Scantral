<!-- --------------------------------------------------------------------------
     MODAL REGISTRO: Formulario de creación de cuenta
     -------------------------------------------------------------------------- -->
<app-auth-card titulo="Creación de cuenta">
  <form class="registro" [formGroup]="registroForm" (ngSubmit)="onSubmit()">
    <app-campo-formulario
      label="Email"
      type="email"
      inputId="registro-email"
      formControlName="email"
    />

    <app-campo-formulario
      label="Contraseña"
      type="password"
      inputId="registro-password"
      formControlName="password"
    />

    <app-campo-formulario
      label="Confirmar contraseña"
      type="password"
      inputId="registro-confirm-password"
      formControlName="confirmPassword"
    />

    <hr class="registro__separator" />

    <app-button variant="primary" size="auth" type="submit" class="registro__action" [disabled]="loading">
      {{ loading ? 'Creando...' : 'Crear cuenta' }}
    </app-button>
  </form>
</app-auth-card>
