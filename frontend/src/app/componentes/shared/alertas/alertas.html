<!-- --------------------------------------------------------------------------
     CONTENEDOR DE ALERTAS (floating, esquina superior derecha)
     -------------------------------------------------------------------------- -->
<div class="alertas">
  @for (alerta of alertaService.alertas(); track alerta.id) {
    <div class="alertas__item" [class]="'alertas__item--' + alerta.tipo">
      <fa-icon class="alertas__icono" [icon]="iconos[alerta.tipo]" />
      <span class="alertas__mensaje">{{ alerta.mensaje }}</span>
      <button
        class="alertas__cerrar"
        type="button"
        aria-label="Cerrar alerta"
        (click)="alertaService.cerrar(alerta.id)"
      >
        <fa-icon [icon]="faXmark" />
      </button>
    </div>
  }
</div>
