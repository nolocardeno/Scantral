<!-- --------------------------------------------------------------------------
     AUTH CARD: Modal con backdrop y tarjeta de autenticación
     -------------------------------------------------------------------------- -->
<aside class="auth-modal" (click)="onBackdropClick($event)">
  <article class="auth-modal__card" role="dialog" aria-modal="true">
    <header class="auth-modal__header">
      <h2 class="auth-modal__title">{{ titulo() }}</h2>
    </header>
    <ng-content />
  </article>
</aside>
