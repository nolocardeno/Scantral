<!-- --------------------------------------------------------------------------
     BOTÓN DE SIDEBAR: Navegación con icono FontAwesome y texto
     -------------------------------------------------------------------------- -->

<!-- Gradiente SVG reutilizable (oculto, solo define el degradado) -->
<svg class="boton-de-sidebar__defs" aria-hidden="true">
  <defs>
    <linearGradient id="grad-sidebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--color-primary)" />
      <stop offset="100%" stop-color="var(--color-secondary)" />
    </linearGradient>
  </defs>
</svg>

<button
  class="boton-de-sidebar"
  [class.boton-de-sidebar--activo]="activo()"
  type="button"
>
  <!-- ------------------------------------------------------------------
       ICONO (FontAwesome)
       ------------------------------------------------------------------ -->
  <fa-icon
    class="boton-de-sidebar__icono"
    [icon]="icono()"
    aria-hidden="true"
  />

  <!-- ------------------------------------------------------------------
       TEXTO
       ------------------------------------------------------------------ -->
  <span class="boton-de-sidebar__texto">{{ etiqueta() }}</span>
</button>
