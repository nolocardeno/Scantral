<!-- --------------------------------------------------------------------------
     FEATURE CARD: Icono + texto (frontal) / Descripción (trasera)
     -------------------------------------------------------------------------- -->
<article
  class="feature-card"
  [class.feature-card--volteada]="volteada()"
  (click)="toggle()"
>
  <section class="feature-card__cara feature-card__frontal">
    <fa-icon [icon]="icono()" class="feature-card__icono" />
    <p class="feature-card__texto">{{ texto() }}</p>
  </section>

  <section class="feature-card__cara feature-card__trasera">
    <p class="feature-card__descripcion">{{ descripcion() }}</p>
  </section>
</article>
