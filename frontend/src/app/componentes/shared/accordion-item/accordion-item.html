<!-- --------------------------------------------------------------------------
     ACCORDION ITEM: Pregunta colapsable con respuesta expandible
     -------------------------------------------------------------------------- -->
<article
  class="accordion-item"
  [class.accordion-item--abierto]="abierto()"
>
  <button
    type="button"
    class="accordion-item__header"
    (click)="toggle()"
    [attr.aria-expanded]="abierto()"
  >
    <span class="accordion-item__pregunta">{{ pregunta() }}</span>
    <svg
      class="accordion-item__icono"
      [class.accordion-item__icono--abierto]="abierto()"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <polyline points="6 9 12 15 18 9" />
    </svg>
  </button>

  <section class="accordion-item__body" [class.accordion-item__body--abierto]="abierto()">
    <div class="accordion-item__contenido">
      <p class="accordion-item__respuesta">
        <ng-content />
      </p>
    </div>
  </section>
</article>
